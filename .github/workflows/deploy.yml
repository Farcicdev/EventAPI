name: Build and deploy of EventApi

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/setup-java@v3

    - name: Configure Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        destribution: 'temurin'

    - name: Build Project
      run: mvn clean install